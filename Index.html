<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/assets/site-icon.png" type="image/x-icon">
    <title>Chidera | Portfolio</title>
    <style>
        :root {
            /* --- COLOR PALETTE DEFINITION --- */
            --bg-main: #0f172a;       /* Deep Navy Background */
            --bg-secondary: #1e293b;  /* Lighter Navy for Cards/Sidebar */
            --accent: #38bdf8;        /* Bright Sky Blue for Highlights */
            --text-main: #f1f5f9;     /* White-ish Text */
            --text-muted: #94a3b8;    /* Grey Text */
            --border-color: #334155;  /* Subtle Border */
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            width: 100vw;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
        }

        /* --- SIDEBAR --- */
        .side-menu {
            width: 280px;
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
            height: 100vh;
            transition: transform 0.3s ease;
            z-index: 100;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 2rem;
            padding: 3rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent);
            margin-bottom: 10px;
            box-shadow: var(--shadow);
        }

        .profile-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent);
            letter-spacing: 1px;
        }

        .nav-links {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
        }

        .nav-links a {
            display: block;
            padding: 12px 15px;
            text-decoration: none;
            color: var(--text-muted);
            border-radius: 8px;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .nav-links a:hover, .nav-links a:focus {
            background-color: var(--accent);
            color: var(--bg-main);
            transform: translateX(5px);
        }

        .footer {
            margin-top: auto;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* --- MAIN CONTENT --- */
        .main-body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            flex: 1;
        }

        .mobile-header {
            display: none; /* Hidden on desktop */
            padding: 15px;
            background-color: var(--bg-secondary);
              align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
        }

        .menu-btn {
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--accent);
        }

        iframe[name="net-screen"] {
            width: 100%;
            flex: 1;
            border: none;
            background-color: var(--bg-main);
        }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 768px) {
            body {
                display: block;
            }

            .sideBack {
                background-color: #00000037;
                height: 100vh;
                width: 100vw;
                position: absolute;
                transform: translateX(-100%);   
            }

            .sideBack.active {
                transform: translateX(0);
            }

            .side-menu {
                position: absolute;
                height: 100vh;
                transform: translateX(-100%); /* Hide by default */
            }

            .side-menu.active {
                transform: translateX(0);
                box-shadow: 5px 0 15px rgba(0,0,0,0.5);
            }

            .mobile-header {
                display: flex;
            }
            
            .close-btn {
                text-align: right;
                font-size: 1.5rem;
                cursor: pointer;
                margin-bottom: 10px;
                display: block;
            }
        }
        
        @media (min-width: 769px) {
            .close-btn { display: none; }
        }
    </style>
</head>
<body>
    <div class="sideBack"></div>

    <nav class="side-menu" id="sideMenu">
        <div class="profile-header">
            <img class="profile-img" src="/assets/W-logo.png" alt="Chidera">
            <div class="profile-name">CHIDDY</div>
        </div>

        <ul class="nav-links">
            <li><a href="Portfolio.html" target="net-screen" onclick="closeOnMobile()">About Me</a></li>
            <li><a href="Skills.html" target="net-screen" onclick="closeOnMobile()">Skills</a></li>
            <li><a href="Projects.html" target="net-screen" onclick="closeOnMobile()">Projects</a></li>
        </ul>

        <div class="footer">
         2025 • Chidera Churchill
        </div>
    </nav>

    <div class="main-body">
        <div class="mobile-header">
            <span class="menu-btn" onclick="toggleMenu()">☰</span>
            <span style="font-weight: bold; color: var(--text-main);">Portfolio</span>
        </div>
        
        <iframe src="Portfolio.html" name="net-screen"></iframe>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
             document.querySelector('.sideBack').classList.toggle('active');
        }

        function closeOnMobile() {
            if (window.innerWidth <= 768) {
                document.getElementById('sideMenu').classList.remove('active');
             document.querySelector('.sideBack').classList.remove('active');

            }
        }

         document.querySelector(".sideBack").addEventListener('click', function(e) {
            if (e.target == this) {
              closeOnMobile()
            }
         }
        )

        document.querySelector("iframe")
    </script>

</body>
</html>
